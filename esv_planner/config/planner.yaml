# ESV Planner Parameters

# Robot footprint (T-shape, flat list of x,y pairs), overall envelope 0.5m x 0.5m
footprint: [0.2, 0.25, 0.2, -0.25, -0.1, -0.25, -0.1, -0.09, -0.3, -0.09, -0.3, 0.09, -0.1, 0.09, -0.1, 0.25]
inscribed_radius: 0.08

paper:
  front_end_clearance: 0.31
  line_of_sight_clearance: 0.16
  local_aabb_half_extent: 0.85
  max_segment_length: 1.1
  max_support_points: 24
  backend:
    max_iterations: 40
    nominal_speed: 0.9
    min_piece_duration: 0.35
    anchor_weight: 4.0
    smooth_weight: 4.0
    obstacle_weight: 50.0
    safety_margin: 0.03
    obstacle_cutoff_distance: 1.0
    sample_time_step: 0.04
    lmbm_max_iterations: 45
    lmbm_max_evaluations: 250
    lmbm_timeout: 30.0
    lmbm_bundle_size: 2
    lmbm_ini_corrections: 7
    lmbm_max_corrections: 15

# Default start/goal
start_pose:
  x: 0.91
  y: 5.47
  yaw: 0.32

goal_pose:
  x: 9.09
  y: 3.58
  yaw: 1.61
